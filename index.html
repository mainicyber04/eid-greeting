<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Mubarak from Maini</title>

  <style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(to bottom, #071b2b, #0d2b45, #123b5d);
  color: white;
  text-align: center;
  overflow-y: auto;
  position: relative;
  padding: 20px;
}

    .moon {
      position: absolute;
      top: 60px;
      right: 100px;
      width: 120px;
      height: 120px;
      background: #ffd86b;
      border-radius: 50%;
      box-shadow: 0 0 30px #ffd86b;
    }

    .moon::after {
      content: "";
      position: absolute;
      left: 30px;
      top: 0;
      width: 120px;
      height: 120px;
      background: #0d2b45;
      border-radius: 50%;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    }

    h1 {
      color: #ffe8a3;
      margin-bottom: 10px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ffd86b;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .message {
      display: none;
      margin-top: 15px;
      line-height: 1.7;
      font-size: 17px;
    }

    .name {
      margin-top: 10px;
      color: #ffd86b;
      font-weight: bold;
      font-size: 18px;
    }

    .friends {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .friends img {
  width: 140px;
  height: 140px;
  border-radius: 15px;
  margin: 8px;
  border: 3px solid #ffd86b;
  object-fit: cover;
}
    }
  </style>
</head>

<body>

  <div class="moon"></div>

  <div class="card">
    <h1>Eid Mubarak 🌙✨</h1>

    <button onclick="showMessage()">Click for Eid Wish 💫</button>
    <button onclick="playMusic()">Play / Pause Music 🎶</button>

    <div class="message" id="msg">
      To Irfaan,
      Eid Mubarak to you & your family.
      May this day bring you peace, happiness, and countless blessings. You are always in my thoughts and prayers. ❤️🌙✨Also Eid Meow-barak to Fusuki🐈the purr-ecious little imam of naps 💤🐱Paws and blessings this Eid

      <div class="name">Love and duas, Maini ❤️</div>
    </div>

    <div class="friends">
      <img src="Img.1.jpeg" alt="Friend photo">
      <img src="Img.2.jpeg" alt="Friend photo">
      <img src="Img.3.jpeg" alt="Friend photo">
      <img src="Img.4.jpeg" alt="Friend photo">
      <img src="Img.5.jpeg" alt="Friend photo">
    </div>
  </div>

  <audio id="music" loop>
    <source src="eidmusic.mp3.mp3" type="audio/mpeg">
  </audio>

  <script>
    function showMessage() {
      document.getElementById("msg").style.display = "block";
    }

    let isPlaying = false;

    function playMusic() {
      const music = document.getElementById("music");

      if (!isPlaying) {
        music.volume = 0.2;
        music.play();
        isPlaying = true;
      } else {
        music.pause();
        isPlaying = false;
      }
    }
  </script>

</body>
</html>
